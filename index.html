<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Games</title>
    <link rel="stylesheet" href="style.css">

    <!-- Data Files -->
    <script src="data/vocabulary.js"></script>
    <script src="data/sentences.js"></script>
    <script src="data/images.js"></script>

    <!-- Components -->
    <script src="components/scoreSystem.js"></script>
    <script src="components/gameLoader.js"></script>
    <script src="components/buttonMenu.js"></script>
</head>

<body>
    <!-- Intro Overlay -->
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-content">
            <img src="assets/images/Logo.png" alt="INTRA IT Interactive Academy" class="intro-logo">
            <h1>INTRA IT Interactive Academy</h1>
            <p>Welcome to English Learning Games</p>
            <button id="btn-launch" class="launch-btn">Launch</button>
        </div>
        <video id="intro-video" class="intro-video" preload="auto">
            <source src="assets/images/Technology_Startup_Intro_Animation_Created.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="app-container" style="display: none;" id="main-app">
        <header>
            <div class="header-logo-container">
                <img src="assets/images/Logo.png" alt="INTRA IT Logo" class="header-logo">
                <h2>INTRA IT Interactive Academy</h2>
            </div>
            <h1>English Learning Games</h1>
            <div id="global-score" class="score-display">Score: 0 | Correct: 0 | Streak: 0</div>
        </header>

        <section class="menu-section">
            <h2>LEVELS</h2>

            <div class="category-tabs">
                <button class="tab-btn active" data-target="kids-menu">Kids</button>
                <button class="tab-btn" data-target="basic-adult-menu">Basic Adult</button>
                <button class="tab-btn" data-target="intermediate-menu">Intermediate</button>
            </div>

            <div id="kids-menu" class="menu-content active"></div>
            <div id="basic-adult-menu" class="menu-content"></div>
            <div id="intermediate-menu" class="menu-content"></div>

            <div class="random-game-container">
                <button id="btn-random-game" class="random-btn">🎲 Random Game</button>
            </div>
        </section>

        <main class="game-area" id="game-area">
            <button id="btn-back-menu" class="back-btn" style="display: none;">⬅️ Back</button>
            <div id="game-container">
                <div class="welcome-message">
                    <h2>Select a game from above to start learning!</h2>
                    <p>Or click the Random Game button to be surprised.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Main Controller -->
    <script src="app.js"></script>
</body>

</html>
